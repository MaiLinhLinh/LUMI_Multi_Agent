<div class="metric-card">
  <div class="metric">
    <span>Humidity</span>
    <strong>{{ data.current.humidity_percent }}%</strong>
  </div>
  <div class="metric">
    <span>Wind</span>
    <strong>{{ data.current.wind.speed_mps }} m/s</strong>
  </div>
  <div class="metric">
    <span>Pressure</span>
    <strong>{{ data.current.pressure_hpa }} hPa</strong>
  </div>
</div>
